<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">ResearchZero - Securing Finance On Chain</title>
  <desc id="desc">A white ResearchZero social banner with large black and red text reading Securing Finance On Chain.</desc>
  <defs>
    <filter id="softNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.055" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="fade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="0.55" stop-color="#fbfbfb" />
      <stop offset="1" stop-color="#f2f2f2" />
    </linearGradient>
    <style>
      .brand {
        fill: #8d8d8d;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 12px;
      }
      .headline {
        fill: #111111;
        font-family: Impact, Arial Black, Arial, Helvetica, sans-serif;
        font-size: 128px;
        font-weight: 900;
        letter-spacing: 6px;
      }
      .accent {
        fill: #b91c1c;
      }
      .line {
        stroke: #d8d8d8;
        stroke-width: 1;
      }
      .network {
        fill: none;
        stroke: #b91c1c;
        stroke-width: 1.1;
        stroke-opacity: 0.16;
      }
      .node {
        fill: #b91c1c;
        opacity: 0.38;
      }
      .muted-node {
        fill: #8f8f8f;
        opacity: 0.24;
      }
    </style>
  </defs>
  <rect width="1500" height="500" fill="url(#fade)" />
  <rect width="1500" height="500" filter="url(#softNoise)" />

  <g opacity="0.9">
    <line class="line" x1="602" y1="22" x2="648" y2="22" />
    <line class="line" x1="852" y1="22" x2="898" y2="22" />
    <text class="brand" x="750" y="26" text-anchor="middle">RESEARCH ZERO</text>
  </g>

  <g transform="translate(540 210)">
    <path class="network" d="M-95 62 L-18 -8 L72 34 L142 -28 L232 48" />
    <path class="network" d="M-18 -8 L18 84 L142 -28 L186 112" />
    <path class="network" d="M72 34 L18 84 L186 112 L232 48" />
    <circle class="node" cx="-95" cy="62" r="4" />
    <circle class="node" cx="-18" cy="-8" r="5" />
    <circle class="node" cx="72" cy="34" r="5" />
    <circle class="node" cx="142" cy="-28" r="4" />
    <circle class="node" cx="232" cy="48" r="5" />
    <circle class="node" cx="18" cy="84" r="5" />
    <circle class="node" cx="186" cy="112" r="4" />
    <circle class="muted-node" cx="-142" cy="-26" r="3" />
    <circle class="muted-node" cx="276" cy="-16" r="3" />
    <circle class="muted-node" cx="96" cy="146" r="3" />
  </g>

  <text class="headline" x="750" y="140" text-anchor="middle">SECURING</text>
  <text class="headline" x="614" y="270" text-anchor="middle">FINANCE</text>
  <text class="headline accent" x="1018" y="270" text-anchor="middle">ON</text>
  <text class="headline" x="750" y="400" text-anchor="middle">CHAIN</text>
</svg>
